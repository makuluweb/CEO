<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEO Engagement Studio — KPMG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0f0e0c; color: #f0ece4; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #c8a96e; border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp .35s ease both; }
    textarea, input, button { font-family: 'DM Sans', sans-serif; }
    textarea { resize: vertical; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const GOLD   = "#c8a96e";
    const DARK   = "#0f0e0c";
    const CARD   = "#141210";
    const BORDER = "rgba(200,169,110,0.2)";

    const QUESTIONS = [
      "What does success actually mean to you right now — not the LinkedIn version?",
      "When did you last feel genuinely out of your depth, and what did that teach you?",
      "What belief are you holding that most people around you would disagree with?",
      "If you stripped away the title tomorrow, who are you?",
      "What's the decision you made that looked wrong to everyone else but you were certain about?",
      "What's the gap between who you present to your board and who you actually are?",
      "Where is the energy in your industry right now — and where is it dying?",
      "What are you most afraid people will discover about how you're running this organisation?",
      "What does the next generation of leaders in your sector fundamentally misunderstand?",
      "If AI, quantum and automation reshape your sector completely in 10 years, what's your honest assessment of whether your organisation will survive?",
      "What would you do differently if you had no obligation to the current stakeholders?",
      "What's the conversation your board needs to have but nobody's willing to start?",
      "When you look at the energy transition — are you leading it, managing it, or hoping it resolves itself?",
      "What do you need to unlearn to lead effectively through the next decade?",
    ];

    // ── Shared UI ──────────────────────────────────────────────────────────────
    function Card({ children, style }) {
      return React.createElement("div", {
        style: { background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20, ...style }
      }, children);
    }

    function Label({ children }) {
      return React.createElement("div", {
        style: { fontFamily: "'Bebas Neue', sans-serif", fontSize: 11, letterSpacing: "0.15em", color: GOLD, marginBottom: 6, textTransform: "uppercase" }
      }, children);
    }

    function TA({ value, onChange, placeholder, rows = 3 }) {
      return React.createElement("textarea", {
        value, placeholder, rows,
        onChange: e => onChange(e.target.value),
        style: {
          width: "100%", background: "#0d0c0a", border: `1px solid ${BORDER}`, borderRadius: 8,
          color: "#f0ece4", fontSize: 14, lineHeight: 1.6,
          padding: "10px 14px", outline: "none", marginTop: 4,
        }
      });
    }

    function GoldBtn({ onClick, disabled, children, small, outline }) {
      return React.createElement("button", {
        onClick, disabled,
        style: {
          background: outline ? "transparent" : disabled ? "#1c1a16" : `linear-gradient(135deg, ${GOLD}, #a8883e)`,
          color: outline ? GOLD : disabled ? "#444" : "#0a0a0a",
          border: outline ? `1px solid ${GOLD}` : "none",
          borderRadius: 6, padding: small ? "6px 14px" : "10px 20px",
          fontSize: small ? 11 : 12, fontWeight: 600,
          cursor: disabled ? "not-allowed" : "pointer", letterSpacing: "0.06em",
          textTransform: "uppercase", opacity: disabled ? 0.4 : 1,
          whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 6,
        }
      }, children);
    }

    function SectionNote({ children }) {
      return React.createElement("p", {
        style: { fontSize: 12, color: "#666", lineHeight: 1.65, marginBottom: 14 }
      }, children);
    }

    // ── Tab 1: Leader Profile & Questions ──────────────────────────────────────
    function Tab1({ state, setState }) {
      const sel = state.selectedQuestions || [];
      const toggle = i => setState(p => ({
        ...p,
        selectedQuestions: sel.includes(i) ? sel.filter(x => x !== i) : [...sel, i]
      }));

      return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 20 } },

        // Profile
        React.createElement(Card, {},
          React.createElement(Label, {}, "Leader Profile"),
          React.createElement("input", {
            type: "text",
            value: state.ceoName || "",
            onChange: e => setState(p => ({ ...p, ceoName: e.target.value })),
            placeholder: "CEO / Board Chair full name…",
            style: {
              width: "100%", background: "#0d0c0a", border: `1px solid ${BORDER}`,
              borderRadius: 8, color: "#f0ece4", fontSize: 16,
              padding: "10px 14px", outline: "none", fontWeight: 500, marginBottom: 14,
            }
          }),
          React.createElement(Label, {}, "Organisation"),
          React.createElement("input", {
            type: "text",
            value: state.org || "",
            onChange: e => setState(p => ({ ...p, org: e.target.value })),
            placeholder: "Company / Organisation…",
            style: {
              width: "100%", background: "#0d0c0a", border: `1px solid ${BORDER}`,
              borderRadius: 8, color: "#f0ece4", fontSize: 14,
              padding: "9px 14px", outline: "none", marginBottom: 14,
            }
          }),
          React.createElement(Label, {}, "Meeting Date"),
          React.createElement("input", {
            type: "date",
            value: state.meetingDate || "",
            onChange: e => setState(p => ({ ...p, meetingDate: e.target.value })),
            style: {
              background: "#0d0c0a", border: `1px solid ${BORDER}`,
              borderRadius: 8, color: "#f0ece4", fontSize: 14,
              padding: "9px 14px", outline: "none", marginBottom: 14,
            }
          }),
          React.createElement(Label, {}, "Background & Research Notes"),
          React.createElement(TA, {
            value: state.profile || "",
            onChange: v => setState(p => ({ ...p, profile: v })),
            placeholder: "What do you know about them? Leadership style, career background, public positions, key decisions, what drives them as a person…",
            rows: 5,
          }),
          React.createElement("div", { style: { marginTop: 14 } },
            React.createElement(Label, {}, "Pre-Meeting Context & Agenda"),
            React.createElement(TA, {
              value: state.preNotes || "",
              onChange: v => setState(p => ({ ...p, preNotes: v })),
              placeholder: "Relationship history, agenda priorities, what you want to get out of this meeting…",
              rows: 3,
            }),
          ),
        ),

        // Questions
        React.createElement(Card, {},
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 } },
            React.createElement(Label, {}, "Question Bank — Steve Bartlett Style"),
            React.createElement("span", { style: { fontSize: 10, color: "#555", fontStyle: "italic" } }, "✓ = include in report"),
          ),
          React.createElement(SectionNote, {}, "Select the questions you plan to use. Capture responses in the field below each one."),
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
            ...QUESTIONS.map((q, i) =>
              React.createElement("div", {
                key: i,
                style: {
                  background: "#0d0c0a",
                  border: `1px solid ${sel.includes(i) ? GOLD : BORDER}`,
                  borderRadius: 10, padding: "12px 14px",
                }
              },
                React.createElement("div", { style: { display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 8 } },
                  React.createElement("button", {
                    onClick: () => toggle(i),
                    style: {
                      width: 20, height: 20, flexShrink: 0, marginTop: 2,
                      background: sel.includes(i) ? GOLD : "transparent",
                      border: `2px solid ${sel.includes(i) ? GOLD : "#444"}`,
                      borderRadius: 4, cursor: "pointer", color: "#0a0a0a",
                      fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center",
                    }
                  }, sel.includes(i) ? "✓" : ""),
                  React.createElement("div", { style: { fontSize: 13.5, lineHeight: 1.6, color: "#e8dfc8", fontStyle: "italic", flex: 1 } }, `"${q}"`),
                ),
                React.createElement(TA, {
                  value: state.answers?.[i] || "",
                  onChange: v => setState(p => ({ ...p, answers: { ...p.answers, [i]: v } })),
                  placeholder: "Capture their response…",
                  rows: 2,
                }),
                React.createElement("div", { style: { marginTop: 8 } },
                  React.createElement("div", { style: { fontSize: 10, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 } }, "Your insight / follow-up probe"),
                  React.createElement(TA, {
                    value: state.insights?.[i] || "",
                    onChange: v => setState(p => ({ ...p, insights: { ...p.insights, [i]: v } })),
                    placeholder: "What did this reveal? What's the follow-up question?",
                    rows: 2,
                  }),
                ),
              )
            ),
          ),
          React.createElement("div", { style: { marginTop: 18 } },
            React.createElement(Label, {}, "Additional Questions / Custom Notes"),
            React.createElement(TA, {
              value: state.customQuestions || "",
              onChange: v => setState(p => ({ ...p, customQuestions: v })),
              placeholder: "Your own questions or notes from the conversation…",
              rows: 4,
            }),
          ),
        ),
      );
    }

    // ── Tab 2: Key Interests & POVs ────────────────────────────────────────────
    function Tab2({ state, setState }) {
      const TREND_TOPICS = [
        "Generative AI & autonomous decision-making",
        "Quantum computing readiness",
        "Industrial automation & workforce",
        "Energy transition & decarbonisation",
        "Critical minerals & supply chain sovereignty",
        "Cyber resilience in operational technology",
        "Capital markets & ESG pressure",
        "Geopolitical risk & resource nationalism",
      ];

      return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 20 } },

        // Key interests
        React.createElement(Card, {},
          React.createElement(Label, {}, "3 Key Interest Areas"),
          React.createElement(SectionNote, {}, "Based on what emerged in the conversation — define the three areas you want to explore and record your own points of view and follow-up questions."),
          ...[0, 1, 2].map(idx =>
            React.createElement("div", { key: idx, style: { marginBottom: 20 } },
              React.createElement(Label, {}, `Area ${idx + 1}`),
              React.createElement("input", {
                type: "text",
                value: state.keyInterests?.[idx] || "",
                onChange: e => {
                  const arr = [...(state.keyInterests || ["", "", ""])];
                  arr[idx] = e.target.value;
                  setState(p => ({ ...p, keyInterests: arr }));
                },
                placeholder: ["e.g. AI adoption roadmap", "e.g. Capital allocation in energy transition", "e.g. Workforce & automation anxiety"][idx],
                style: {
                  width: "100%", background: "#0d0c0a", border: `1px solid ${BORDER}`, borderRadius: 8,
                  color: "#f0ece4", fontSize: 14, padding: "9px 14px", outline: "none", marginBottom: 8,
                }
              }),
              React.createElement("div", { style: { fontSize: 10, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 } }, "Your point of view"),
              React.createElement(TA, {
                value: state.povs?.[idx] || "",
                onChange: v => setState(p => ({ ...p, povs: { ...p.povs, [idx]: v } })),
                placeholder: "What's your bold POV on this topic? What does it mean for their sector? Contrarian angle?",
                rows: 3,
              }),
              React.createElement("div", { style: { fontSize: 10, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4, marginTop: 8 } }, "Follow-up questions to explore"),
              React.createElement(TA, {
                value: state.povFollowUps?.[idx] || "",
                onChange: v => setState(p => ({ ...p, povFollowUps: { ...p.povFollowUps, [idx]: v } })),
                placeholder: "Questions to push deeper on this area…",
                rows: 2,
              }),
            )
          ),
        ),

        // Trends
        React.createElement(Card, {},
          React.createElement(Label, {}, "Future Trends — Key Topics"),
          React.createElement(SectionNote, {}, "Tick the trends most relevant to this conversation and add your notes on each."),
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 } },
            ...TREND_TOPICS.map((topic, i) => {
              const checked = (state.trendTopics || []).includes(i);
              return React.createElement("div", {
                key: i,
                style: { background: "#0d0c0a", border: `1px solid ${checked ? GOLD : BORDER}`, borderRadius: 8, padding: "10px 12px" }
              },
                React.createElement("div", {
                  onClick: () => {
                    const arr = state.trendTopics || [];
                    setState(p => ({ ...p, trendTopics: checked ? arr.filter(x => x !== i) : [...arr, i] }));
                  },
                  style: { display: "flex", alignItems: "center", gap: 10, cursor: "pointer", marginBottom: checked ? 8 : 0 }
                },
                  React.createElement("div", { style: {
                    width: 18, height: 18, flexShrink: 0,
                    background: checked ? GOLD : "transparent",
                    border: `2px solid ${checked ? GOLD : "#444"}`, borderRadius: 4,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "#0a0a0a", fontSize: 11, fontWeight: 700,
                  }}, checked ? "✓" : ""),
                  React.createElement("span", { style: { fontSize: 13.5, color: checked ? "#e8dfc8" : "#888" } }, topic),
                ),
                checked && React.createElement(TA, {
                  value: state.trendNotes?.[i] || "",
                  onChange: v => setState(p => ({ ...p, trendNotes: { ...p.trendNotes, [i]: v } })),
                  placeholder: "Notes on this trend — what it means for them, key questions it raises…",
                  rows: 2,
                }),
              );
            })
          ),
          React.createElement(Label, {}, "Your additional observations"),
          React.createElement(TA, {
            value: state.tab2Notes || "",
            onChange: v => setState(p => ({ ...p, tab2Notes: v })),
            placeholder: "Overarching themes, tensions or opportunities from this conversation…",
            rows: 4,
          }),
        ),
      );
    }

    // ── Tab 3: 90-Day Actions ──────────────────────────────────────────────────
    function Tab3({ state, setState }) {
      const TIMEFRAMES = ["0–30 days", "30–60 days", "60–90 days"];

      return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 20 } },

        React.createElement(Card, {},
          React.createElement(Label, {}, "Suggested 90-Day Strategic Actions"),
          React.createElement(SectionNote, {}, "Record strategic actions across the 90-day horizon. Assign a timeframe, owner and KPMG angle for each."),
          ...(state.suggestedActionsList || [{ tf: 0, title: "", why: "", kpmg: "" }]).map((action, i) =>
            React.createElement("div", {
              key: i,
              style: { background: "#0d0c0a", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "14px", marginBottom: 12 }
            },
              React.createElement("div", { style: { display: "flex", gap: 10, marginBottom: 10, flexWrap: "wrap", alignItems: "center" } },
                React.createElement("div", { style: { display: "flex", gap: 6 } },
                  ...TIMEFRAMES.map((tf, ti) =>
                    React.createElement("button", {
                      key: ti,
                      onClick: () => {
                        const arr = [...(state.suggestedActionsList || [])];
                        arr[i] = { ...arr[i], tf: ti };
                        setState(p => ({ ...p, suggestedActionsList: arr }));
                      },
                      style: {
                        padding: "4px 10px", borderRadius: 4, fontSize: 10, fontWeight: 600,
                        letterSpacing: "0.06em", textTransform: "uppercase", cursor: "pointer",
                        background: action.tf === ti ? GOLD : "transparent",
                        color: action.tf === ti ? "#0a0a0a" : "#666",
                        border: `1px solid ${action.tf === ti ? GOLD : "#444"}`,
                      }
                    }, tf)
                  )
                ),
                (state.suggestedActionsList || []).length > 1 && React.createElement("button", {
                  onClick: () => setState(p => ({ ...p, suggestedActionsList: (p.suggestedActionsList || []).filter((_, j) => j !== i) })),
                  style: { marginLeft: "auto", background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 18, lineHeight: 1 }
                }, "×"),
              ),
              React.createElement("div", { style: { fontSize: 10, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 } }, "Action"),
              React.createElement("input", {
                type: "text",
                value: action.title || "",
                onChange: e => {
                  const arr = [...(state.suggestedActionsList || [])];
                  arr[i] = { ...arr[i], title: e.target.value };
                  setState(p => ({ ...p, suggestedActionsList: arr }));
                },
                placeholder: "Action title…",
                style: { width: "100%", background: "#111", border: `1px solid ${BORDER}`, borderRadius: 6, color: "#f0ece4", fontSize: 14, padding: "8px 12px", outline: "none", marginBottom: 8 }
              }),
              React.createElement("div", { style: { display: "flex", gap: 10, flexWrap: "wrap" } },
                React.createElement("div", { style: { flex: 1, minWidth: 180 } },
                  React.createElement("div", { style: { fontSize: 10, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 } }, "Why it matters"),
                  React.createElement(TA, {
                    value: action.why || "",
                    onChange: v => {
                      const arr = [...(state.suggestedActionsList || [])];
                      arr[i] = { ...arr[i], why: v };
                      setState(p => ({ ...p, suggestedActionsList: arr }));
                    },
                    placeholder: "Why this matters now…",
                    rows: 2,
                  }),
                ),
                React.createElement("div", { style: { flex: 1, minWidth: 180 } },
                  React.createElement("div", { style: { fontSize: 10, color: "#555", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 } }, "KPMG angle"),
                  React.createElement(TA, {
                    value: action.kpmg || "",
                    onChange: v => {
                      const arr = [...(state.suggestedActionsList || [])];
                      arr[i] = { ...arr[i], kpmg: v };
                      setState(p => ({ ...p, suggestedActionsList: arr }));
                    },
                    placeholder: "How KPMG adds value here…",
                    rows: 2,
                  }),
                ),
              ),
            )
          ),
          React.createElement(GoldBtn, {
            onClick: () => setState(p => ({ ...p, suggestedActionsList: [...(p.suggestedActionsList || [{ tf: 0, title: "", why: "", kpmg: "" }]), { tf: 0, title: "", why: "", kpmg: "" }] })),
            small: true,
            outline: true,
          }, "+ Add Action"),
        ),

        React.createElement(Card, {},
          React.createElement(Label, {}, "Actions Agreed in the Meeting"),
          React.createElement(SectionNote, {}, "Record commitments made in the room."),
          ...(state.agreedActions || [""]).map((action, i) =>
            React.createElement("div", { key: i, style: { display: "flex", gap: 8, marginBottom: 8, alignItems: "center" } },
              React.createElement("input", {
                type: "text",
                value: action,
                onChange: e => {
                  const arr = [...(state.agreedActions || [""])];
                  arr[i] = e.target.value;
                  setState(p => ({ ...p, agreedActions: arr }));
                },
                placeholder: `Agreed action ${i + 1}…`,
                style: { flex: 1, background: "#0d0c0a", border: `1px solid ${BORDER}`, borderRadius: 8, color: "#f0ece4", fontSize: 14, padding: "9px 14px", outline: "none" }
              }),
              React.createElement("div", { style: { display: "flex", gap: 4 } },
                i === (state.agreedActions || [""]).length - 1 && (state.agreedActions || [""]).length < 15 &&
                  React.createElement(GoldBtn, { small: true, onClick: () => setState(p => ({ ...p, agreedActions: [...(p.agreedActions || [""]), ""] })) }, "+ Add"),
                (state.agreedActions || [""]).length > 1 &&
                  React.createElement(GoldBtn, { small: true, outline: true, onClick: () => setState(p => ({ ...p, agreedActions: (p.agreedActions || [""]).filter((_, j) => j !== i) })) }, "✕"),
              ),
            )
          ),
          React.createElement("div", { style: { marginTop: 16 } },
            React.createElement(Label, {}, "Owner / Timeline / Dependencies"),
            React.createElement(TA, {
              value: state.actionOwners || "",
              onChange: v => setState(p => ({ ...p, actionOwners: v })),
              placeholder: "Assign owners and dates, note blockers…",
              rows: 3,
            }),
          ),
        ),
      );
    }

    // ── Tab 4: Follow-Up & Export ──────────────────────────────────────────────
    function Tab4({ state, setState }) {
      const [exp, setExp] = useState({ profile: true, questions: true, povs: true, actions: true, followup: true });

      const TREND_TOPICS = [
        "Generative AI & autonomous decision-making",
        "Quantum computing readiness",
        "Industrial automation & workforce",
        "Energy transition & decarbonisation",
        "Critical minerals & supply chain sovereignty",
        "Cyber resilience in operational technology",
        "Capital markets & ESG pressure",
        "Geopolitical risk & resource nationalism",
      ];

      const buildHTML = () => {
        const ceo  = state.ceoName || "CEO / Board Chair";
        const org  = state.org || "";
        const date = state.meetingDate
          ? new Date(state.meetingDate).toLocaleDateString("en-AU", { day: "numeric", month: "long", year: "numeric" })
          : new Date().toLocaleDateString("en-AU", { day: "numeric", month: "long", year: "numeric" });

        const sec = (h, b) => b ? `<div class="section"><h2>${h}</h2><div class="content">${b}</div></div>` : "";

        const qAndA = QUESTIONS.map((q, i) => {
          if (!state.answers?.[i] && !state.selectedQuestions?.includes(i)) return "";
          return `<div class="qa">
            <div class="q">"${q}"</div>
            ${state.answers?.[i] ? `<div class="a"><strong>Response:</strong> ${state.answers[i]}</div>` : ""}
            ${state.insights?.[i] ? `<div class="insight"><span class="tag">✦ Insight / Follow-up</span>${state.insights[i]}</div>` : ""}
          </div>`;
        }).filter(Boolean).join("");

        const povsHTML = (state.keyInterests || []).map((area, i) => {
          if (!area) return "";
          return `<div class="pov">
            <h3>${area}</h3>
            ${state.povs?.[i] ? `<div class="content">${state.povs[i]}</div>` : ""}
            ${state.povFollowUps?.[i] ? `<div class="followq"><span class="tag">Follow-up questions</span>${state.povFollowUps[i]}</div>` : ""}
          </div>`;
        }).join("");

        const trendsHTML = (state.trendTopics || []).map(i => `
          <div class="trend">
            <strong>${TREND_TOPICS[i]}</strong>
            ${state.trendNotes?.[i] ? `<div>${state.trendNotes[i]}</div>` : ""}
          </div>
        `).join("");

        const actionsListHTML = (state.suggestedActionsList || []).filter(a => a.title).map(a => {
          const tf = ["0–30 days", "30–60 days", "60–90 days"][a.tf] || "0–30 days";
          return `<div class="action-item">
            <div class="tf-badge">${tf}</div>
            <div class="action-title">${a.title}</div>
            ${a.why ? `<div><strong>Why it matters:</strong> ${a.why}</div>` : ""}
            ${a.kpmg ? `<div><strong>KPMG angle:</strong> ${a.kpmg}</div>` : ""}
          </div>`;
        }).join("");

        const agreedHTML = (state.agreedActions || []).filter(Boolean).length
          ? `<h3>Agreed in Meeting</h3><ul>${(state.agreedActions || []).filter(Boolean).map(a => `<li>${a}</li>`).join("")}</ul>` : "";

        return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>KPMG CEO Engagement — ${ceo}</title>
